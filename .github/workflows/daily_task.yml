name: 全自动选股策略

on:
  schedule:
    - cron: '0 10 * * 1-5'  # 每个工作日（周一至周五）每天的 18 点触发
  workflow_dispatch:  # 允许手动触发工作流

jobs:
  run_weekday_task:
    runs-on: ubuntu-latest  # 使用最新的 Ubuntu 环境

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3  # 拉取代码

    - name: Set up Python
      uses: actions/setup-python@v4  # 设置 Python 环境
      with:
        python-version: '3.9'  # 设置所需的 Python 版本

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt  # 安装依赖项，假设你已经在 requirements.txt 文件中列出了所有依赖（包括 backtrader）

    - name: Run Python script
      env:
      # Setting an environment variable with the value of a configuration variable
        tg_group1: ${{ vars.TG_GROUP1 }}
        tg_group2: ${{ vars.TG_GROUP2 }}
        tg_token: ${{ vars.TG_TOKEN }}
      run: |
        pwd
        ls -la
        echo "$tg_group1和$tg_group2"
        python stock_chose.py --download ALL --chose rule3 --group $tg_group1 $tg_group2 --token $tg_token   # 运行你的 Python 脚本，生成输出文件
 
    - name: Commit and push generated files
      run: |
        pwd
        ls -la
        git config --global user.name "DLuPan"
        git config --global user.email "wingsgod@outlook.com"
        git status
        git add .
        git status
        git commit -m "Add daily generated file for weekdays"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
